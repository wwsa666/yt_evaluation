server:
  port: 8080
spring:
  application:
    name: gateway-service
  cloud:
    # Sentinel 限流配置
    sentinel:
      transport:
        dashboard: localhost:8858
        port: 8719
      eager: true
      scg:
        fallback:
          mode: response
          response-status: 429
          response-body: '{"success":false,"errorMsg":"请求过于频繁，请稍后再试"}'
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      routes:
        - id: user_route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        - id: shop_route
          uri: lb://shop-service
          predicates:
            - Path=/api/shop/**
          filters:
            - StripPrefix=1
        - id: review_route
          uri: lb://review-service
          predicates:
            - Path=/api/review/**
          filters:
            - StripPrefix=1
      # 跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
  codec:
    max-in-memory-size: 10MB
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


